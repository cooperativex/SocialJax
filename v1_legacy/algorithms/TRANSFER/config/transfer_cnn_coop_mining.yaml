# TRANSFER Configuration for Cooperative Mining
defaults:
  - transfer_base

"ENV_NAME": "coop_mining"
"NUM_ENVS": 256
"NUM_MINIBATCHES": 300

"ENV_KWARGS": 
  "num_agents": 6
  "num_inner_steps": 1000
  "shared_rewards": False
  "num_outer_steps": 1
  "max_miners": 4
  "min_gold_miners": 2
  "mining_range": 3
  "reward_iron": 1.0
  "reward_gold": 8.0
  "gold_mining_window": 3
  "regrowth_prob_iron": 0.0004
  "regrowth_prob_gold": 0.00016
  "cnn": True
  "jit": True
  "svo": False
  "svo_target_agents": [0, 1, 2, 3, 4, 5]
  "svo_w": 0.5
  "svo_ideal_angle_degrees": 90
  "interest": True
  "s_interest_change_every": 30000000

"REWARD": "individual"
"WANDB_TAGS": 
  - INDIVIDUAL_REWARD
