# SVO Configuration for Harvest Common (Partnership)
defaults:
  - svo_base

# Environment-specific settings
"ENV_NAME": "harvest_common_open"

"ENV_KWARGS": 
  "num_agents": 7
  "num_inner_steps": 1000
  "shared_rewards": False
  "cnn": True
  "jit": True
  "svo": True
  "svo_target_agents": [0, 1, 2, 3, 4, 5, 6]
  "svo_w": 0.5
  "svo_ideal_angle_degrees": 90
  map_ASCII: ["AAA    A      A    AAA",
              "AA    AAA    AAA    AA",
              "A    AAAAA  AAAAA    A",
              "      AAA    AAA      ",
              "       A      A       ",
              "  A                A  ",
              " AAA  Q   WW   Q  AAA ",
              "AAAAA            AAAAA",
              " AAA  WWWWWWWWWW  AAA ",
              "  A       WW       A  ",
              "WWWWWWWWW WW WWWWWWWWW",
              "          WW          ",
              "  WWWWWWWWWWWWWWWWWW  ",
              "  P P P P P P P P P   ",
              " P P P P P P P P P P  ",
             ]

# Reward settings
"REWARD": "individual"
"WANDB_TAGS": 
  - INDIVIDUAL_REWARD
