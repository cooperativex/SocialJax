# SVO Configuration for Cooperative Mining
defaults:
  - svo_base

# Environment-specific settings
"ENV_NAME": "coop_mining"

"ENV_KWARGS": 
  "num_agents": 6
  "num_inner_steps": 1000
  "shared_rewards": False
  "num_outer_steps": 1
  "max_miners": 4  # how many miners can we store per gold cell
  "min_gold_miners": 2  # how many distinct miners needed to finalize gold
  "mining_range": 3
  "reward_iron": 1.0
  "reward_gold": 8.0
  "gold_mining_window": 3
  "regrowth_prob_iron": 0.0004
  "regrowth_prob_gold": 0.00016
  "cnn": True
  "jit": True
  "svo": True
  "svo_target_agents": [0, 1, 2, 3, 4, 5, 6]
  "svo_w": 0.5
  "svo_ideal_angle_degrees": 90

# Reward settings
"REWARD": "individual"
"WANDB_TAGS": 
  - INDIVIDUAL_REWARD
