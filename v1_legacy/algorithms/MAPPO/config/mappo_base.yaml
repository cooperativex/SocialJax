# Base MAPPO Configuration
# Common hyperparameters shared across all MAPPO experiments
# Individual configs can override these defaults

# MAPPO-specific training hyperparameters
"LR": 0.001
"NUM_ENVS": 256
"NUM_STEPS": 1000
"TOTAL_TIMESTEPS": 1e9
"UPDATE_EPOCHS": 2
"NUM_MINIBATCHES": 64
"GAMMA": 0.99
"GAE_LAMBDA": 0.95
"CLIP_EPS": 0.2
"ENT_COEF": 0.01
"VF_COEF": 0.5
"MAX_GRAD_NORM": 0.5
"SCALE_CLIP_EPS": True
"ACTIVATION": "relu"

# Reward shaping
"REW_SHAPING_HORIZON": 2.5e6

# Environment defaults (common settings)
"ENV_KWARGS":
  "num_inner_steps": 1000
  "shared_rewards": True  # MAPPO typically uses common rewards
  "cnn": True
  "jit": True

# Training settings
"ANNEAL_LR": True
"TUNE": False

# Seed and evaluation
"SEED": 30
"NUM_SEEDS": 1
"GIF_NUM_FRAMES": 250

# WandB defaults
"ENTITY": ""
"PROJECT": "socialjax"
"WANDB_MODE": "online"
