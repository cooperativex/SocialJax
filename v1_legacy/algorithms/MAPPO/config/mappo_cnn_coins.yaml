# MAPPO Configuration for Coin Game
defaults:
  - mappo_base

# Environment-specific settings
"ENV_NAME": "coin_game"
"NUM_ACTORS": 2
"TOTAL_TIMESTEPS": 3e8

"ENV_KWARGS": 
  "num_agents": 2
  "num_inner_steps": 1000
  "shared_rewards": True
  "cnn": True
  "jit": True

# Reward settings
"REWARD": "MAPPO_common"
"WANDB_TAGS": 
  - COMMON_REWARD
