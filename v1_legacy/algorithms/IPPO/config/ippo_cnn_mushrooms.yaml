# IPPO Configuration for Mushrooms
defaults:
  - ippo_base

# Environment-specific settings
"ENV_NAME": "mushrooms"
"LR": 0.0001

"ENV_KWARGS":
  "num_agents": 5
  "num_inner_steps": 1000
  "shared_rewards": False
  "cnn": True
  "jit": True

# Reward settings (only remark for wandb tags, as the reward type is already set in "shared_rewards")
"REWARD": "individual"
"WANDB_TAGS":
  - INDIVIDUAL_REWARD
