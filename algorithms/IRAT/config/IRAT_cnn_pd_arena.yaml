# IRAT Configuration for PD Arena
defaults:
  - irat_base

# Environment-specific settings
"ENV_NAME": "pd_arena"

"ENV_KWARGS": 
  "num_agents": 4
  "num_inner_steps": 1000
  "shared_rewards": False
  "cnn": True
  "jit": True

# IRAT-specific settings
"REWARD": "IRAT"  # IRAT uses both individual and team rewards
"WANDB_TAGS": 
  - IRAT
  - INDIVIDUAL_REWARD
