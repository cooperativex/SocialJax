# IPPO Configuration for Harvest Common (Open)
defaults:
  - ippo_base

# Environment-specific settings
"ENV_NAME": "harvest_common_open"

"ENV_KWARGS":
  "num_agents": 7
  "num_inner_steps": 1000
  "shared_rewards": False
  "cnn": True
  "jit": True

# Reward settings (only remark for wandb tags, as the reward type is already set in "shared_rewards")
"REWARD": "individual"
"WANDB_TAGS":
  - INDIVIDUAL_REWARD
