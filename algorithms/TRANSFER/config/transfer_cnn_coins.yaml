# TRANSFER Configuration for Coin Game
defaults:
  - transfer_base

"ENV_NAME": "coin_game"
"NUM_ENVS": 600

"ENV_KWARGS": 
  "num_agents": 2
  "num_inner_steps": 1000
  "shared_rewards": False
  "cnn": True
  "jit": True
  "svo": False
  "svo_target_agents": [0, 1]
  "svo_w": 0.5
  "svo_ideal_angle_degrees": 90
  "interest": True
  # n_agents = 2  =>  s = 1 / (1 + ratio * (n - 1))
  #   ratio = 1/4  ->  s = 4/5  = 0.8000
  #   ratio = 1/2  ->  s = 2/3  ~ 0.6667   (default below)
  #   ratio = 3/4  ->  s = 4/7  ~ 0.5714
  "s_interest": 0.6667

"REWARD": "individual"
"WANDB_TAGS": 
  - INDIVIDUAL_REWARD

"PROJECT": "transfer_fixed_socialjax"
