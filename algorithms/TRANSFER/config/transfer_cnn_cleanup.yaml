# TRANSFER Configuration for Clean Up
defaults:
  - transfer_base

"ENV_NAME": "clean_up"
"NUM_ENVS": 200

"ENV_KWARGS": 
  "num_agents": 7
  "num_inner_steps": 1000
  "shared_rewards": False
  "cnn": True
  "jit": True
  "svo": False
  "svo_target_agents": [0, 1, 2, 3, 4, 5, 6]
  "svo_w": 0.5
  "svo_ideal_angle_degrees": 90
  "interest": True
  # n_agents = 7  =>  s = 1 / (1 + ratio * (n - 1))
  #   ratio = 1/4  ->  s = 2/5   = 0.4000
  #   ratio = 1/2  ->  s = 1/4   = 0.2500   (default below)
  #   ratio = 3/4  ->  s = 2/11  ~ 0.1818
  "s_interest": 0.25

"REWARD": "individual"
"WANDB_TAGS": 
  - INDIVIDUAL_REWARD

"PROJECT": "transfer_fixed_socialjax"
