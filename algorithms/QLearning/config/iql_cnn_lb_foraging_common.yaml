# Hydra configuration - change output directory
hydra:
  run:
    dir: ../../evaluation/iql/outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: ../../evaluation/iql/outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}

alg:
  "TOTAL_TIMESTEPS": 2e6  # Reduced from 5M for faster testing
  "NUM_ENVS": 32
  "NUM_STEPS": 1
  "BUFFER_SIZE": 5e4  # Reduced buffer size for LBF
  "BUFFER_BATCH_SIZE": 128
  "HIDDEN_SIZE": 64
  "EPS_START": 1.0
  "EPS_FINISH": 0.05
  "EPS_DECAY": 0.2  # Epsilon decay as fraction of training
  "LEARNING_STARTS": 1e3
  "MAX_GRAD_NORM": 1
  "TARGET_UPDATE_INTERVAL": 10
  "NUM_EPOCHS": 4
  "LR": 0.0001
  "LR_LINEAR_DECAY": True
  "GAMMA": 0.99
  "TAU": 1.0
  "LOSS_TYPE": "iql"  # Independent Q-Learning - each agent learns independently

  # evaluate
  "TEST_DURING_TRAINING": True
  "TEST_INTERVAL": 0.05 # as a fraction of updates, i.e. log every 5% of training process
  "TEST_NUM_STEPS": 200
  "TEST_NUM_ENVS": 256 # number of episodes to average over

# env - SocialJax LB Foraging environment
"ENV_NAME": "lb_foraging"
"ENV_KWARGS":
  "num_agents": 3
  "grid_size": 10
  "num_food": 4
  "max_food_level": 3
  "max_agent_level": 3  # NEW: Agents can have levels 1, 2, or 3
  "num_inner_steps": 200  # Episode length
  "shared_rewards": True  # False = individual rewards, True = common rewards
  "sight": 2  # Observation radius
  "cnn": True
  "jit": True

"REW_SHAPING_HORIZON": 1e6  # No reward shaping for LBF (simple rewards)

# experiment params
"NUM_SEEDS": 1 # number of vmapped seeds
"SEED": 42

"HYP_TUNE": False # perform hyp tune

# wandb params
"ENTITY": ""
"PROJECT": "socialjax"
"WANDB_MODE": "online"
"WANDB_LOG_ALL_SEEDS": False # will log separately the vmapped seeds
"WANDB_DIR": "../../evaluation/iql/wandb"  # wandb output directory

# where to save the params (if None, will not save)
"SAVE_PATH": "checkpoints/iql"
