# Hydra configuration - change output directory
hydra:
  run:
    dir: ../../evaluation/iql/outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: ../../evaluation/iql/outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}

alg:
  "TOTAL_TIMESTEPS": 5e6
  "NUM_ENVS": 32
  "NUM_STEPS": 1
  "BUFFER_SIZE": 1e5
  "BUFFER_BATCH_SIZE": 128
  "HIDDEN_SIZE": 64
  "EPS_START": 1.0
  "EPS_FINISH": 0.05
  "EPS_DECAY": 0.1
  "LEARNING_STARTS": 1e3
  "MAX_GRAD_NORM": 1
  "TARGET_UPDATE_INTERVAL": 10
  "NUM_EPOCHS": 4
  "LR": 0.00007
  "LR_LINEAR_DECAY": True
  "GAMMA": 0.99
  "TAU": 1.
  "LOSS_TYPE": "iql"  # Independent Q-Learning - each agent learns independently

  # evaluate
  "TEST_DURING_TRAINING": True
  "TEST_INTERVAL": 0.05 # as a fraction of updates, i.e. log every 5% of training process
  "TEST_NUM_STEPS": 400
  "TEST_NUM_ENVS": 512 # number of episodes to average over, can affect performance

# env - SocialJax harvest_common_open environment
"ENV_NAME": "harvest_common_open"
"ENV_KWARGS":
  "num_agents": 7
  "num_inner_steps": 1000
  "shared_rewards": False  # False = individual rewards, True = common rewards
  "cnn": True
  "jit": True

"REW_SHAPING_HORIZON": 2.5e6

# experiment params
"NUM_SEEDS": 1 # number of vmapped seeds
"SEED": 30

"HYP_TUNE": False # perform hyp tune

# wandb params
"ENTITY": ""
"PROJECT": "socialjax"
"WANDB_MODE": "online"
"WANDB_LOG_ALL_SEEDS": False # will log separately the vmapped seeds
"WANDB_DIR": "../../evaluation/iql/wandb"  # wandb output directory

# where to save the params (if None, will not save)
"SAVE_PATH": "checkpoints/iql"
